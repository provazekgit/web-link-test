<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <title>Kontrola odkazů</title>
  <style>
    :root{
      --ok:#0a8a4a; --ok-bg:#eafbf1; --fail:#c0272d; --fail-bg:#fdecec;
      --ink:#1c2430; --muted:#5b6472; --line:#e4e7ec; --brand:#2454ff; --card-bg:#ffffff; --page-bg:#f4f6f9;
    }
    *{box-sizing:border-box}
    body{
      font-family:"Segoe UI",system-ui,Arial,sans-serif;margin:0;padding:0;
      background:var(--page-bg);color:var(--ink);
    }
    .wrap{max-width:820px;margin:0 auto;padding:32px 24px 60px}
    header.top{margin-bottom:24px}
    header.top h1{font-size:1.6rem;margin:0 0 4px}
    header.top .meta{color:var(--muted);font-size:.88rem}
    header.top .meta code{background:#eef1f6;padding:2px 6px;border-radius:6px;color:var(--ink)}

    .card{background:var(--card-bg);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:20px;box-shadow:0 1px 2px rgba(20,25,35,.04)}
    .card h3{margin:0 0 14px;font-size:1.02rem;padding-bottom:10px;border-bottom:2px solid var(--line)}

    label{display:block;margin-top:12px;font-size:.88rem;font-weight:600;color:var(--ink)}
    label.inline{display:flex;align-items:center;gap:8px;font-weight:500;margin-top:8px;cursor:pointer}
    label.inline input{width:auto}
    input[type=text], input:not([type]), input[type=url], input[type=date], textarea{
      width:100%;padding:9px 11px;margin-top:5px;border:1px solid var(--line);border-radius:8px;
      font-size:.92rem;font-family:inherit;background:#fbfcfd;color:var(--ink)
    }
    input:focus, textarea:focus{outline:2px solid var(--brand);outline-offset:1px;background:#fff}
    .muted{color:var(--muted)}
    code{background:#eef1f6;padding:2px 6px;border-radius:6px}

    .devices-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:2px 14px;margin-top:8px}

    .btn-primary{margin-top:18px;padding:12px 22px;font-weight:700;font-size:.98rem;color:#fff;
      background:var(--brand);border:none;border-radius:10px;cursor:pointer;width:100%}
    .btn-primary:hover{background:#1c40d6}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}

    .footer-row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-top:10px}
    .footer-row > div{flex:1;min-width:160px}

    /* --- průběh testu --- */
    .run-status{display:none;margin:0 0 20px}
    .run-status.running{display:block}
    .run-status .card{border-color:var(--brand)}
    .run-status .phase-line{display:flex;align-items:center;gap:10px;font-weight:600;font-size:.95rem;margin-bottom:12px}
    .spinner{width:18px;height:18px;border:3px solid var(--line);border-top:3px solid var(--brand);border-radius:50%;
      animation:spin 1s linear infinite;flex:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .step-track{display:flex;gap:6px;margin-bottom:14px}
    .step-track .dot{flex:1;height:5px;border-radius:3px;background:var(--line)}
    .step-track .dot.done{background:var(--ok)}
    .step-track .dot.active{background:var(--brand)}
    .progress-outer{background:var(--line);border-radius:999px;height:12px;overflow:hidden}
    .progress-inner{background:var(--brand);height:100%;border-radius:999px;width:0%;transition:width .4s ease}
    .progress-meta{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-top:8px}
    .run-status.error .card{border-color:var(--fail)}
    .run-status.error .phase-line{color:var(--fail)}

    /* --- výsledek --- */
    .result-box{display:none}
    .result-box.show{display:block}
    .result-box .card{border-color:var(--ok);background:var(--ok-bg)}
    .result-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
    .result-stats .stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
    .result-stats .stat .num{font-size:1.3rem;font-weight:700;color:var(--ink)}
    .result-stats .stat .label{font-size:.74rem;color:var(--muted);margin-top:2px}
    .result-links a{display:inline-block;font-weight:700;color:var(--brand);text-decoration:none;margin-right:16px}
    .result-links a:hover{text-decoration:underline}
    .result-box .duration{color:var(--muted);font-size:.85rem;margin-top:10px}
  </style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>Kontrola odkazů</h1>
    <div class="meta">Reporty se ukládají do: <code>{{ reports_root }}</code></div>
  </header>

  <div id="runStatus" class="run-status">
    <div class="card">
      <div class="phase-line">
        <div class="spinner" aria-hidden="true"></div>
        <span id="phaseText">Připravuji test…</span>
      </div>
      <div class="step-track" id="stepTrack">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div class="progress-outer"><div class="progress-inner" id="progressBar"></div></div>
      <div class="progress-meta">
        <span id="progressCount"></span>
        <span id="progressEta"></span>
      </div>
    </div>
  </div>

  <div id="resultBox" class="result-box">
    <div class="card">
      <h3 style="border:none;margin:0 0 12px">✅ Test dokončen</h3>
      <div class="result-stats" id="resultStats"></div>
      <div class="result-links" id="resultLinks"></div>
      <div class="duration" id="resultDuration"></div>
    </div>
  </div>

  <form id="testForm" method="post" action="/run">
    <div class="card">
      <h3>Web k otestování</h3>
      <label>Base URL *</label>
      <input name="base_url" placeholder="https://mojedomena.cz" required>

      <label>Sitemap URL (volitelné)</label>
      <input name="sitemap_url" placeholder="https://24s.cz/sitemap.xml">
    </div>

    <div class="card">
      <h3>Screenshoty (volitelné)</h3>
      <label class="inline"><input type="checkbox" name="screenshots_enabled" value="1"> Udělat screenshoty vlastních URL</label>

      <p class="muted" style="margin:14px 0 0"><b>Zařízení / prohlížeče</b> (vyber aspoň jedno):</p>
      <div class="devices-grid">
        <label class="inline"><input type="checkbox" name="devices" value="Desktop Chrome"> Desktop Chrome</label>
        <label class="inline"><input type="checkbox" name="devices" value="Desktop Firefox"> Desktop Firefox</label>
        <label class="inline"><input type="checkbox" name="devices" value="Desktop Edge"> Desktop Edge</label>
        <label class="inline"><input type="checkbox" name="devices" value="Desktop Opera"> Desktop Opera</label>

        <label class="inline"><input type="checkbox" name="devices" value="iPhone 13 Safari"> iPhone 13 Safari</label>
        <label class="inline"><input type="checkbox" name="devices" value="iPad Mini Safari"> iPad Mini Safari</label>
        <label class="inline"><input type="checkbox" name="devices" value="Android Chrome (Pixel 7)"> Android Chrome (Pixel 7)</label>
        <label class="inline"><input type="checkbox" name="devices" value="Galaxy S23 Chrome"> Galaxy S23 Chrome</label>

        <label class="inline"><input type="checkbox" name="devices" value="macOS Safari (Desktop)"> macOS Safari (Desktop)</label>
        <label class="inline"><input type="checkbox" name="devices" value="macOS Chrome (Desktop)"> macOS Chrome (Desktop)</label>
      </div>

      <label>URL pro screenshot (max 10) – každé na nový řádek (může být i relativní, např. <code>/kontakt</code>)</label>
      <textarea name="screenshot_pages" rows="5"></textarea>
    </div>

    <div class="card">
      <h3>Patička reportu (volitelné)</h3>
      <label>Vlastní text do patičky (např. jméno klienta, poznámka, kontakt)</label>
      <textarea name="footer_text" rows="2" placeholder="Např.: Report připraven pro Magnolia Medical s.r.o. – kontakt: jan@agentura.cz"></textarea>

      <div class="footer-row">
        <div style="flex:none">
          <label>Barva textu patičky</label>
          <input type="color" name="footer_color" value="#1c2430" style="width:60px;height:38px;padding:2px;">
        </div>
        <div>
          <label>Podpis (jméno / pozice)</label>
          <input name="footer_signature" placeholder="Např.: Jan Novák, konzultant">
        </div>
        <div>
          <label>Datum</label>
          <input type="date" name="footer_date">
        </div>
      </div>
    </div>

    <button id="submitBtn" type="submit" class="btn-primary">Spustit test</button>
  </form>

</div>

<script>
(function () {
  const form = document.getElementById('testForm');
  const submitBtn = document.getElementById('submitBtn');
  const runStatus = document.getElementById('runStatus');
  const phaseText = document.getElementById('phaseText');
  const stepTrack = document.getElementById('stepTrack');
  const progressBar = document.getElementById('progressBar');
  const progressCount = document.getElementById('progressCount');
  const progressEta = document.getElementById('progressEta');
  const resultBox = document.getElementById('resultBox');
  const resultStats = document.getElementById('resultStats');
  const resultLinks = document.getElementById('resultLinks');
  const resultDuration = document.getElementById('resultDuration');

  let poller = null;

  function setSteps(step, total, isError) {
    const dots = stepTrack.querySelectorAll('.dot');
    dots.forEach((dot, i) => {
      dot.classList.remove('done', 'active');
      if (isError) return;
      if (i < step - 1) dot.classList.add('done');
      else if (i === step - 1) dot.classList.add('active');
    });
  }

  function renderResult(result) {
    resultStats.innerHTML =
      '<div class="stat"><div class="num">' + result.pages + '</div><div class="label">stránek</div></div>' +
      '<div class="stat"><div class="num">' + result.screens + '</div><div class="label">screenshotů</div></div>' +
      (result.excluded ? '<div class="stat"><div class="num">' + result.excluded + '</div><div class="label">vynecháno</div></div>' : '');
    resultLinks.innerHTML =
      '<a href="' + result.report_url + '" target="_blank">➡ Otevřít kompletní report</a>' +
      (result.simple_report_url ? '<a href="' + result.simple_report_url + '" target="_blank">jednoduchá verze</a>' : '');
    resultDuration.textContent = '⏱ Skutečná doba testu: ' + result.duration;
    resultBox.classList.add('show');
  }

  function poll(jobId) {
    fetch('/api/progress/' + jobId)
      .then(r => r.json())
      .then(data => {
        if (data.error && !data.status) {
          phaseText.textContent = 'Chyba: ' + data.error;
          runStatus.classList.add('error');
          clearInterval(poller);
          submitBtn.disabled = false;
          return;
        }

        phaseText.textContent = data.phase || 'Pracuji…';
        setSteps(data.step || 0, data.step_total || 5, data.status === 'error');

        const pct = data.total > 0 ? Math.round((data.current / data.total) * 100) : (data.status === 'done' ? 100 : 8);
        progressBar.style.width = pct + '%';
        progressCount.textContent = data.total > 0 ? (data.current + ' / ' + data.total) : '';
        progressEta.textContent = data.eta ? ('odhad do konce: ' + data.eta) : (data.elapsed ? ('uplynulo: ' + data.elapsed) : '');

        if (data.status === 'done') {
          clearInterval(poller);
          runStatus.classList.remove('running');
          submitBtn.disabled = false;
          renderResult(data.result);
        } else if (data.status === 'error') {
          clearInterval(poller);
          runStatus.classList.add('error');
          phaseText.textContent = 'Chyba: ' + (data.error || 'test se nepodařilo dokončit');
          submitBtn.disabled = false;
        }
      })
      .catch(() => {
        // dočasný výpadek sítě/serveru – zkusíme to znovu při dalším tiku
      });
  }

  if (form) {
    form.addEventListener('submit', (ev) => {
      ev.preventDefault();
      resultBox.classList.remove('show');
      runStatus.classList.remove('error');
      runStatus.classList.add('running');
      phaseText.textContent = 'Připravuji test…';
      progressBar.style.width = '4%';
      progressCount.textContent = '';
      progressEta.textContent = '';
      setSteps(0, 5, false);
      submitBtn.disabled = true;

      const formData = new FormData(form);
      fetch('/run', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            phaseText.textContent = 'Chyba: ' + data.error;
            runStatus.classList.add('error');
            submitBtn.disabled = false;
            return;
          }
          if (poller) clearInterval(poller);
          poller = setInterval(() => poll(data.job_id), 1000);
          poll(data.job_id);
        })
        .catch(() => {
          phaseText.textContent = 'Nepodařilo se spustit test (chyba spojení se serverem).';
          runStatus.classList.add('error');
          submitBtn.disabled = false;
        });
    });
  }
})();
</script>
</body>
</html>
